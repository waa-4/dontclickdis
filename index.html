<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hehe</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: black;
            height: 100%;
            font-family: Arial, sans-serif;
        }
        #blobfish {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 98%;
            max-height: 98%;
            z-index: 9999;
            display: none;
            image-rendering: pixelated; /* makes it look sharper */
        }
    </style>
</head>
<body>

    <img id="blobfish" src="https://tenor.com/view/fly-blobfish-blob-fish-blobfish-flying-blobfish-scream-gif-3901112318664547619" alt="FLYING BLOBFISH">

    <script>
        // First popup
        alert("why did you click the link?");

        // Second popup
        alert("you are a stubborn one eh?");

        // After both alerts → unleash the chaos
        const gif = document.getElementById("blobfish");
        gif.style.display = "block";

        // Loud alarm sound (direct working link - air raid / loud siren style)
        const audio = new Audio("https://www.orangefreesounds.com/wp-content/uploads/2016/09/Air-raid-siren.mp3");

        audio.volume = 1.0;     // Maximum volume
        audio.loop = true;      // Keeps screaming

        // Play the sound
        function playLoud() {
            audio.play().catch(() => {
                // Fallback for mobile browsers that block autoplay
                document.body.addEventListener('touchstart', () => audio.play(), { once: true });
                document.body.addEventListener('click', () => audio.play(), { once: true });
            });
        }

        playLoud();

        // Extra loud attempt (some browsers need this)
        setTimeout(() => {
            const audio2 = new Audio(audio.src);
            audio2.volume = 1.0;
            audio2.loop = true;
            audio2.play();
        }, 600);

        // Final annoying popup
        setTimeout(() => {
            alert("TURN YOUR VOLUME UP :)");
        }, 1200);

        // Make the GIF shake a bit for extra chaos
        setInterval(() => {
            gif.style.transform = `translate(-50%, -50%) rotate(${Math.random() * 8 - 4}deg)`;
            setTimeout(() => {
                gif.style.transform = "translate(-50%, -50%)";
            }, 100);
        }, 300);
    </script>

</body>
</html>
